version: '3.8'

services:

  postgres-attractions:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: attractions_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - attractions-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d attractions_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-reviews:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: reviews_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - reviews-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d reviews_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    ports:
      - "8761:8761"
    restart: on-failure

  attractions-service:
    build:
      context: ./attractions-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    depends_on:
      postgres-attractions:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-attractions:5432/attractions_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    restart: on-failure

  reviews-service:
    build:
      context: ./reviews-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    depends_on:
      postgres-reviews:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-reviews:5432/reviews_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    restart: on-failure

volumes:
  attractions-data:
  reviews-data: